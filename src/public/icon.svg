<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Chart line gradient -->
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Magnifying glass gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Auction chart bars -->
  <g transform="translate(20, 50)">
    <rect x="0" y="20" width="14" height="36" rx="3" fill="#ffffff" opacity="0.9"/>
    <rect x="20" y="10" width="14" height="46" rx="3" fill="#ffffff" opacity="0.85"/>
    <rect x="40" y="25" width="14" height="31" rx="3" fill="#ffffff" opacity="0.8"/>
    <rect x="60" y="5" width="14" height="51" rx="3" fill="#ffffff" opacity="0.95"/>
    <rect x="80" y="15" width="14" height="41" rx="3" fill="#ffffff" opacity="0.75"/>
  </g>
  
  <!-- Chart line overlay -->
  <polyline 
    points="27,55 47,45 67,60 87,40 107,50" 
    fill="none" 
    stroke="url(#chartGrad)" 
    stroke-width="3" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    opacity="0.9"/>
  
  <!-- Data points on the line -->
  <circle cx="27" cy="55" r="3" fill="#00d4ff"/>
  <circle cx="47" cy="45" r="3" fill="#38bdf8"/>
  <circle cx="67" cy="60" r="3" fill="#6366f1"/>
  <circle cx="87" cy="40" r="3" fill="#7c3aed"/>
  <circle cx="107" cy="50" r="3" fill="#8b5cf6"/>
  
  <!-- Magnifying glass (inspection symbol) -->
  <g transform="translate(78, 28)">
    <circle cx="16" cy="16" r="14" fill="url(#glassGrad)" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="26" y1="26" x2="36" y2="36" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Reflection highlight -->
    <path d="M 10 10 Q 16 6 22 10" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- AD text indicator -->
  <text x="26" y="38" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" opacity="0.95" text-anchor="middle">AD</text>
</svg>
